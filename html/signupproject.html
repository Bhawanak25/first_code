<body>
  <!-- SignUp Start -->
   
    <div class="container p-4 w-50 mt-5 register-box" >
        <form method="post" action="register.php">
        <h3 class="text-center bg-light mb-3">Create An Account</h3>
        <p class="top-text">
            Set a strong & memorable master password.<br>
            We don’t store it, so make sure you<b> remember it</b>.
            It’s the last password you’ll ever need.
        </p>
        <div class="mb-5">
        <label><b>Email</b></label>
        <input type="email" name="email" class=" form-control" placeholder="Email">
         </div>
         <div class="mb-5">
        <label><b>Master Password</b></label>
        <!-- <input type="password" name="password" class=" form-control" placeholder="Master Password"> -->
        <div class="input-group">
      <input type="password" id="password" class="form-control" placeholder="Master password">
      <span class="toggle-visibility" onclick="toggleVisibility()">👁️</span>
      </div>
      </div>
        <div class="mb-5">
        <label><b>Confirm Master Password</b></label>
        <!-- <input type="password" name="password" class=" form-control" placeholder="Confirm Master Password"> -->
         <div class="input-group">
      <input type="password" id="password" class="form-control" placeholder="Confirm Master password">
      <span class="toggle-visibility" onclick="toggleVisibility()">👁️</span>
        </div>
        </div>
        <button type="submit" name="submit" class="btn btn-info register-btn"><a href="homeproject.html" class="text-dark">Sign Up-It's Free</a></button>
        <p class="text-center">Forget Password?</p>
        <p class="text-center">Already have an account?<a href="loginproject.html"><span>Login</span></a></p>

        <!-- Java Script Start -->

         <script>
    function toggleVisibility() {
      const passwordField = document.getElementById("password");
      const icon = document.querySelector(".toggle-visibility");

      if (passwordField.type === "password") {
        passwordField.type = "text";
        icon.textContent = "👁"; // hide icon
      } else {
        passwordField.type = "password";
        icon.textContent = "👁"; // show icon
      }
    }
  </script>

  <!-- Java Script End -->
