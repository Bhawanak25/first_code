<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SecureVault Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
  <div class="container py-5">
    <h2 class="mb-4">🔐 SecureVault</h2>

    <!-- 🔑 Password Generator -->
    <div class="mb-5">
      <h4>Generate Password</h4>
      <div class="row g-2">
        <div class="col-auto">
          <input type="number" id="length" class="form-control" placeholder="Length" value="12">
        </div>
        <div class="col-auto">
          <button class="btn btn-primary" onclick="generatePassword()">Generate</button>
        </div>
      </div>
      <textarea id="output" class="form-control mt-3" rows="2" readonly></textarea>
    </div>

    <!-- 📥 Vault Entry Form -->
    <h4>Add a Vault Entry</h4>
    <form method="POST" action="add.php" class="row g-3">
      <div class="col-md-6">
        <input name="title" class="form-control" placeholder="Site Title" required>
      </div>
      <div class="col-md-6">
        <input name="login_user" class="form-control" placeholder="Username" required>
      </div>
      <div class="col-md-6">
        <input name="login_pass" class="form-control" placeholder="Password" required>
      </div>
      <div class="col-md-6">
        <input name="url" class="form-control" placeholder="Site URL">
      </div>
      <div class="col-12">
        <textarea name="notes" class="form-control" placeholder="Notes" rows="2"></textarea>
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-success">Save Entry</button>
      </div>
    </form>
  </div>

  <script>
    function generatePassword() {
      const length = document.getElementById("length").value || 12;
      const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()";
      let password = "";
      for (let i = 0; i < length; i++) {
        password += charset.charAt(Math.floor(Math.random() * charset.length));
      }
      document.getElementById("output").value = password;
    }
  </script>
</body>
</html>
