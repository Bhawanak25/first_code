<body>
  <!-- Profile Button -->
  <div class="profile-button position-absolute top-0 start-0 m-3">
    <button class="btn btn-outline-light d-flex align-items-center gap-2" id="openProfileBtn">
      <i class="fas fa-user-circle fa-lg"></i> <span>Profile</span>
    </button>
  </div>

  <!-- Profile Popup -->
  <div id="profilePopup" class="profile-popup card p-3" style="display: none;">
    <div class="text-center">
      <img src="assets2/image/chicago.jpg" class="rounded-circle mb-2" width="80" height="80" alt="Profile Picture">
      <h6 class="fw-bold mb-1" id="profileName">Your Name</h6>
      <small class="text-muted" id="profileEmail">your@email.com</small>
    </div>
    <hr>
    <div class="px-2">
      <p><strong>Username:</strong> <span id="profileUsername">username123</span></p>
      <p><strong>Contact:</strong> <span id="profileContact">9876543210</span></p>
    </div>
    <div class="d-grid gap-2 mt-2">
      <button class="btn btn-sm btn-outline-secondary">Edit Profile</button>
      <button class="btn btn-sm btn-outline-danger">Logout</button>
      <button class="btn btn-sm btn-light" id="closeProfileBtn">Close</button>
    </div>
  </div>

  <!-- Page Title -->
  <h1 class="logo-text text-light mt-5 text-center">PassHive</h1>

  <!-- Main Block Section -->
  <!-- <div class="container bg"> -->
    <div class="row">

      <!-- Password Hub Block -->
      <div class="col-lg-4 col-md-6 col-12 block mx-3 text-light">
        <a href="contactus.html" class="text-decoration-none d-flex flex-column align-items-center">
          <img src="assets2/image/IconScout_files/4396853.webp" alt="password-hub" class="hub-icon">
          <h4 class="link-text">Password Hub</h4>
        </a>
      </div>

      <!-- Password Generator Block -->
      <div class="col-lg-4 col-md-6 col-12 block mx-3 text-light ms-5">
        <a href="projectp1.html" class="text-decoration-none d-flex flex-column align-items-center">
          <img src="assets2/image/Generate AI Button_files/8479114.webp" alt="generator-icon" class="hub-icon-gen">
          <h4 class="link-text">Password Generator</h4>
        </a>
      </div>

    <!-- </div> -->
  </div>
  <!-- java script -->
<script>
  $(document).ready(function () {
    // Simulated user data (you can replace this with data from PHP or MySQL)
    const userData = {
      name: "Bhawana Kumawat",
      email: "bhawana.k@example.com",
      username: "bhawana123",
      contact: "9876543210"
    };

    // Show popup and load data
    $('#openProfileBtn').click(function () {
      $('#profileName').text(userData.name);
      $('#profileEmail').text(userData.email);
      $('#profileUsername').text(userData.username);
      $('#profileContact').text(userData.contact);
      $('#profilePopup').fadeIn();
    });

    // Close popup
    $('#closeProfileBtn').click(function () {
      $('#profilePopup').fadeOut();
    });
  });
</script>
