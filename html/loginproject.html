    <!-- Login Block Start -->

    <div class="container p-4 w-50 mt-5 border register-box" >
        <form method="post" action="register.php">
        <h3 class="text-center bg-light mb-3">Login</h3>

        <div class="mb-5">
        <label><b>Email</b></label>
        <input type="email" name="email" class=" form-control" placeholder="enter email">
         </div>

        <label><b>Password</b></label>
        <!-- <input type="password" name="password" class=" form-control" placeholder="enter password">
        </div>  -->
     <div class="input-group">
      <input type="password" id="password" class="form-control" placeholder="Enter password">
      <span class="toggle-visibility" onclick="toggleVisibility()">👁️</span>
  </div>

  </div>
       <button type="submit" name="submit" class="btn btn-info register-btn ">
        <a href="homeproject.html" class="text-dark">Login</a>
      </button> 
        <p class="text-center">Forget Password?</p>
        <p class="text-center">Don't have an account?<a href="signupproject.html"><span>Sign up</span></a></p>
</form>

<!-- Login Block End -->

<!-- Java Script -->

 <script>
    function toggleVisibility() {
      const passwordField = document.getElementById("password");
      const icon = document.querySelector(".toggle-visibility");

      if (passwordField.type === "password") {
        passwordField.type = "text";
        icon.textContent = "👁"; // hide icon
      } else {
        passwordField.type = "password";
        icon.textContent = "👁"; // show icon
      }
    }

  </script>

  <!-- Java Script End -->
