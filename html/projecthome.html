<script>
  $(document).ready(function () {

      name: "Bhawana Kumawat",
      email: "bhawana.k@example.com",
      username: "bhawana123",
      contact: "9876543210"
    };

    // Show popup and load data
    $('#openProfileBtn').click(function () {
      $('#profileName').text(userData.name);
      $('#profileEmail').text(userData.email);
      $('#profileUsername').text(userData.username);
      $('#profileContact').text(userData.contact);
