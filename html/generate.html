<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Passyka - Password Generator</title>
  <link rel="stylesheet" href="passyka.css" />
  <style>
  body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to right, #4e54c8, #8f94fb);
  color: #fff;
  margin: 0;
  padding: 0;
  text-align: center;
   background-image : url('https://www.shutterstock.com/image-vector/padlock-keyhole-icon-personal-data-260nw-1704910756.jpg');
  background-size: cover;
}

.container {
  max-width: 1000px;
  margin:50px auto;

  padding: 30px;
  border-radius: 15px;
  color: white;
  box-shadow: 0px 0px 20px  white;
  
}

h1 {
  margin-bottom: 25px;
  font-size: 2em;
  color:white;
}

.settings label {
  display: block;
  margin: 10px 0;
  text-align: left;
}

.settings input[type="number"] {
  width: 60px;
  margin-left: 10px;
}

.settings button {
  margin-top: 20px;
  padding: 10px 20px;
  background-color: #75179aff;
  border: none;
  color: white;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
}

.output {
  margin-top: 25px;
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

.output input {
  width: 70%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-size: 1em;
}

.output button {
  padding: 10px 15px;
  background-color: #75179aff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: white;
}


h1 {
  font-size: 2em;
  margin-bottom: 20px;
}

.green {
  color: #75179aff;
}

.input-group {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin-bottom: 30px;
}

.input-group input {
  padding: 10px;
  font-size: 1em;
  width: 250px;
  border: 1px solid #ccc;
  border-radius: 5px;
}

.input-group button {
  padding: 10px 15px;
  font-size: 1em;
  border: none;
  background-color: #6f238eff;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

table th, table td {
  border: 1px solid #ddd;
  padding: 10px;
}

table th {
  background-color: #0abde3;
  color: white;
}

table td {
  background-color: #f1f1f1;
}
  
table td button {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1.1em;
}
#result{
  border: 1px solid  grey;
}
</style>
<script>
    function generatePassword() {
      const length = document.getElementById('length').value;
      const includeUppercase = document.getElementById('uppercase').checked;
      const includeLowercase = document.getElementById('lowercase').checked;
      const includeNumbers = document.getElementById('numbers').checked;
      const includeSymbols = document.getElementById('symbols').checked;

      const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      const lower = "abcdefghijklmnopqrstuvwxyz";
      const nums = "0123456789";
      const symbs = "@#$%^&*()_+~`|}{[]:;?><,./-=";

      let allChars = "";
      if (includeUppercase) allChars += upper;
      if (includeLowercase) allChars += lower;
      if (includeNumbers) allChars += nums;
      if (includeSymbols) allChars += symbs;

      let password = "";
      for (let i = 0; i < length; i++) {
        password += allChars.charAt(Math.floor(Math.random() * allChars.length));
      }

      document.getElementById('result').value = password;
    }

    function copyPassword() {
      const result = document.getElementById('result');
      result.select();
      document.execCommand("copy");
      alert("Password copied to clipboard!");
    }
  </script>
</head>
<body>
  <div class="container" >
    <h1>🔐 Welcome to Passhive</h1>

    <div class="settings">
      <label>Password Length:
        <input type="number" id="length" min="4" max="32" value="12" />
      </label>

      <label><input type="checkbox" id="uppercase" checked /> Uppercase (A-Z)</label>
      <label><input type="checkbox" id="lowercase" checked /> Lowercase (a-z)</label>
      <label><input type="checkbox" id="numbers" checked /> Numbers (0-9)</label>
      <label><input type="checkbox" id="symbols" checked /> Symbols (@#$%)</label>

      <button onclick="generatePassword() ">Generate Password</button>
    </div>

    <div class="output">
      <input type="text" id="result" readonly placeholder="Your password will appear here" />
      <button onclick="copyPassword()">📋 Copy</button>
      </div>

  
  <div >
  <h1 >Your Own Password Manager</h1>

  <!-- Input Fields -->
  <div class="input-group">
    <input type="text" id="site" placeholder="Enter website URL" />
    <input type="text" id="username" placeholder="Enter Username" />
    <input type="text" id="password" placeholder="Enter Password" />
    <button onclick="generatePassword()">Generate 🔐</button>
    <button onclick="savePassword()">💾 Save</button>
  </div>

</div>

</div>
</body>
</html>
